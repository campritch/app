<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube → Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --dark: #0e1323;
      --grey-1: #707481;
      --text-primary: #252733;
      --text-secondary: #5a5f6e;
      --border: #dee0e4;
      --border-light: #e8e8e8;
      --white: #ffffff;
      --coral: #ed7470;
      --btn-dark: #111111;
      --pill-bg: #f3f4f6;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; line-height: 1.5;
      color: var(--dark); background: #f5f5f3;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ── Top bar ── */
    .top-bar {
      position: sticky; top: 0; z-index: 200;
      height: 56px; display: flex; align-items: center; gap: 16px;
      padding: 0 28px; background: var(--white);
      border-bottom: 1px solid var(--border-light);
    }
    .top-bar__logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 15px; color: var(--dark);
      text-decoration: none; flex-shrink: 0; letter-spacing: -0.3px;
    }
    .logo-mark {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--coral); display: flex; align-items: center; justify-content: center;
    }
    .top-bar__title { flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary); }

    /* ── Page ── */
    .page { max-width: 900px; margin: 40px auto; padding: 0 24px 80px; }

    /* ── Cards ── */
    .card {
      background: var(--white); border: 1px solid var(--border-light);
      border-radius: 20px; margin-bottom: 24px;
    }
    .card__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border-light);
    }
    .card__label {
      font-size: 12px; font-weight: 600; color: var(--grey-1);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .card__body { padding: 28px 32px; }

    /* ── Input card ── */
    .input-card { padding: 32px; }
    .input-card h1 { margin: 0 0 6px; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .input-card p { margin: 0 0 20px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    .input-row { display: flex; gap: 10px; }
    .url-input {
      flex: 1; height: 42px; padding: 0 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.15s;
    }
    .url-input:focus { border-color: var(--dark); }
    .url-input::placeholder { color: var(--grey-1); }


    /* ── Buttons ── */
    .btn-dark {
      height: 42px; padding: 0 20px; background: var(--btn-dark); color: #fff;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 7px;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-dark:hover { opacity: 0.85; }
    .btn-dark:disabled { opacity: 0.45; cursor: default; }
    .btn-outline {
      height: 32px; padding: 0 14px; background: none;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-outline:hover { background: var(--pill-bg); }

    /* ── Status ── */
    .status {
      margin-top: 14px; font-size: 13px;
      display: flex; align-items: center; gap: 8px; color: var(--text-secondary);
    }
    .status--error { color: #c0392b; }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--dark);
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Article ── */
    .article-body {
      padding: 36px 40px; font-size: 15px; line-height: 1.75; color: var(--text-primary);
      min-height: 80px;
    }
    .article-body h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.6px; color: var(--dark); margin: 0 0 20px; line-height: 1.2; }
    .article-body h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--dark); margin: 32px 0 12px; }
    .article-body h3 { font-size: 15px; font-weight: 700; color: var(--dark); margin: 24px 0 8px; }
    .article-body p { margin: 0 0 16px; }
    .article-body ul, .article-body ol { margin: 0 0 16px; padding-left: 22px; }
    .article-body li { margin-bottom: 6px; }
    .article-body blockquote {
      margin: 24px 0; padding: 14px 20px;
      border-left: 3px solid var(--coral); background: #fff5f5;
      border-radius: 0 8px 8px 0; font-style: italic; color: var(--text-secondary);
    }
    .article-body strong { font-weight: 700; color: var(--dark); }
    .article-body code { background: var(--pill-bg); border-radius: 4px; padding: 2px 6px; font-size: 13px; }

    /* Streaming cursor */
    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--coral); margin-left: 2px; animation: blink 0.8s step-end infinite; vertical-align: text-bottom; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Thumbnail ── */
    .thumb-layout { display: grid; grid-template-columns: 1fr 260px; gap: 24px; align-items: start; }
    .thumb-preview {
      border-radius: 12px; overflow: hidden; border: 1px solid var(--border-light);
      aspect-ratio: 16/9; background: var(--pill-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .controls { display: flex; flex-direction: column; gap: 18px; }
    .control-group label { display: block; font-size: 11px; font-weight: 600; color: var(--grey-1); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 7px; }
    .control-group input[type="text"] { width: 100%; height: 34px; padding: 0 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 600; outline: none; }
    .control-group input[type="text"]:focus { border-color: var(--dark); }
    .slider-wrap { display: flex; align-items: center; gap: 8px; }
    .slider-label { font-size: 11px; color: var(--grey-1); white-space: nowrap; }
    input[type="range"] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--dark); cursor: pointer; }
    .slider-val { font-size: 11px; font-weight: 700; color: var(--dark); min-width: 28px; text-align: right; }
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { height: 28px; padding: 0 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--text-secondary); background: none; cursor: pointer; transition: all 0.1s; }
    .chip.active { background: var(--dark); color: #fff; border-color: var(--dark); }
    .swatch-row { display: flex; gap: 8px; }
    .swatch { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.1s; }
    .swatch.active { border-color: var(--dark); outline: 2px solid var(--dark); outline-offset: 2px; }
    .photo-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .photo-chip { width: 42px; height: 42px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; overflow: hidden; background: var(--pill-bg); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--grey-1); transition: border-color 0.1s; }
    .photo-chip.active { border-color: var(--coral); }
  </style>
</head>
<body>

<header class="top-bar">
  <a href="/" class="top-bar__logo">
    <div class="logo-mark"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4" fill="white"/></svg></div>
    SpotsNow
  </a>
  <span class="top-bar__title">YouTube → Article</span>
</header>

<main class="page">

  <!-- Input -->
  <div class="card input-card">
    <h1>YouTube to Article</h1>
    <p>Paste a YouTube URL — fetches the transcript, streams a polished article, and generates a branded thumbnail.</p>
    <div class="input-row">
      <input id="url-input" class="url-input" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
      <button class="btn-dark" id="generate-btn" onclick="generate()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5h9M6.5 2l4.5 4.5-4.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Generate
      </button>
    </div>
    <div class="status" id="status" style="display:none;"></div>
  </div>

  <!-- Article -->
  <div class="card" id="article-card" style="display:none;">
    <div class="card__header">
      <span class="card__label">Article</span>
      <div style="display:flex;gap:8px;">
        <button class="btn-outline" onclick="copyMarkdown()">Copy markdown</button>
        <button class="btn-outline" onclick="copyText()">Copy text</button>
      </div>
    </div>
    <div class="article-body" id="article-body"></div>
  </div>

  <!-- Thumbnail -->
  <div class="card" id="thumb-card" style="display:none;">
    <div class="card__header">
      <span class="card__label">Thumbnail</span>
      <div style="display:flex;gap:8px;">
        <button class="btn-outline" id="regen-btn" onclick="regenThumb()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 6A4 4 0 112 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10 3v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Regenerate
        </button>
        <button class="btn-outline" onclick="downloadThumb()">Download</button>
      </div>
    </div>
    <div class="card__body">
      <div class="thumb-layout">
        <div>
          <div class="thumb-preview" id="thumb-preview"><div class="spinner"></div></div>
        </div>
        <div class="controls">
          <div class="control-group">
            <label>Line 1</label>
            <input type="text" id="t-line1" placeholder="THE COST OF" />
          </div>
          <div class="control-group">
            <label>Line 2 (highlight)</label>
            <input type="text" id="t-line2" placeholder="PODCAST ADS" />
          </div>
          <div class="control-group">
            <label>Complexity</label>
            <div class="slider-wrap">
              <span class="slider-label">Clean</span>
              <input type="range" id="complexity" min="0" max="100" value="70"
                oninput="document.getElementById('complexity-val').textContent=this.value+'%'" />
              <span class="slider-val" id="complexity-val">70%</span>
              <span class="slider-label">Elaborate</span>
            </div>
          </div>
          <div class="control-group">
            <label>Background</label>
            <div class="swatch-row">
              <div class="swatch active" onclick="selectBg(this,'dark')" style="background:#0e1323;" title="Dark navy"></div>
              <div class="swatch" onclick="selectBg(this,'black')" style="background:#111111;" title="Black"></div>
              <div class="swatch" onclick="selectBg(this,'coral')" style="background:#ed7470;" title="Coral"></div>
              <div class="swatch" onclick="selectBg(this,'navy')" style="background:#0a0e28;" title="Deep navy"></div>
            </div>
          </div>
          <div class="control-group">
            <label>Photo side</label>
            <div class="chip-row">
              <button class="chip active" onclick="selectSide(this,'right')">Right</button>
              <button class="chip" onclick="selectSide(this,'left')">Left</button>
            </div>
          </div>
          <div class="control-group">
            <label>Photo</label>
            <div class="photo-grid" id="photo-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const isLocal = window.location.hostname === 'localhost';
const TRANSCRIPT_API = isLocal ? 'http://localhost:5055/generate' : '/api/transcript';
const THUMB_API      = isLocal ? 'http://localhost:5055/thumbnail' : '/api/thumbnail';
const CLAUDE_API     = 'https://api.anthropic.com/v1/messages';
const PHOTOS = ['cam1','cam2','cam3','Cam'];

const ARTICLE_PROMPT = (transcript) => `You are an expert writer and journalist. Below is the transcript of a YouTube video.

Turn it into a well-structured, engaging article:
- Compelling headline
- Strong lede that hooks the reader
- Clear sections with subheadings where appropriate
- Readable style — not a transcript dump
- Preserve key ideas, quotes, and insights
- Brief conclusion

At the very end, after the article, output this exact block:
---THUMBNAIL---
LINE1: [3-5 word context phrase, e.g. "THE COST OF"]
LINE2: [2-4 word punchy key phrase, e.g. "PODCAST ADS"]
---END---

Return the article in clean markdown, then the THUMBNAIL block.

Transcript:
${transcript}`;

// ── State ───────────────────────────────────────────────────────────────────
let rawMarkdown = '';
let currentThumbB64 = '';
let thumbData = { line1: '', line2: '', complexity: 70, bg: 'dark', side: 'right', photo: 0 };
let renderTimer = null;

// ── API key — fetched once from /api/config, cached for session ──────────────
let _cachedKey = '';
async function getKey() {
  if (_cachedKey) return _cachedKey;
  try {
    const res = await fetch(isLocal ? 'http://localhost:5055/config' : '/api/config');
    const data = await res.json();
    _cachedKey = data.key || '';
  } catch {}
  return _cachedKey;
}

// ── Photo chips ─────────────────────────────────────────────────────────────
(function() {
  const grid = document.getElementById('photo-grid');
  PHOTOS.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'photo-chip' + (i === 0 ? ' active' : '');
    div.textContent = name;
    div.onclick = () => {
      document.querySelectorAll('.photo-chip').forEach(c => c.classList.remove('active'));
      div.classList.add('active');
      thumbData.photo = i;
    };
    grid.appendChild(div);
  });
})();

// ── Transcript (browser-side, avoids cloud IP blocks) ───────────────────────
function extractVideoId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/|v\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

async function fetchTranscript(videoId) {
  const proxy = 'https://api.allorigins.win/get?url=';
  const ytUrl = `https://www.youtube.com/watch?v=${videoId}`;

  // Fetch the YouTube page through CORS proxy
  const pageRes = await fetch(proxy + encodeURIComponent(ytUrl));
  if (!pageRes.ok) throw new Error('Could not fetch YouTube page');
  const { contents: html } = await pageRes.json();

  // Pull out ytInitialPlayerResponse
  const jsonMatch = html.match(/ytInitialPlayerResponse\s*=\s*(\{.+?\})\s*;/s);
  if (!jsonMatch) throw new Error('Could not parse YouTube page');
  const player = JSON.parse(jsonMatch[1]);

  const tracks = player?.captions?.playerCaptionsTracklistRenderer?.captionTracks;
  if (!tracks?.length) throw new Error('No captions found for this video');

  // Prefer English, fall back to first available
  const track = tracks.find(t => t.languageCode === 'en') ||
                tracks.find(t => t.languageCode?.startsWith('en')) ||
                tracks[0];

  // Fetch the caption XML
  const capRes = await fetch(proxy + encodeURIComponent(track.baseUrl));
  if (!capRes.ok) throw new Error('Could not fetch captions');
  const { contents: xml } = await capRes.json();

  // Parse XML and return plain text
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  return Array.from(doc.getElementsByTagName('text'))
    .map(t => t.textContent
      .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
      .replace(/&#39;/g, "'").replace(/&quot;/g, '"').replace(/\n/g, ' '))
    .join(' ');
}

// ── Generate ────────────────────────────────────────────────────────────────
async function generate() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  document.getElementById('article-card').style.display = 'none';
  document.getElementById('thumb-card').style.display = 'none';
  rawMarkdown = '';

  showStatus('loading', 'Fetching transcript…');

  // Step 1: get transcript directly from browser (no cloud IP issues)
  let transcript, videoId;
  try {
    videoId = extractVideoId(url);
    if (!videoId) throw new Error('Could not parse a video ID from that URL');
    transcript = await fetchTranscript(videoId);
  } catch (e) {
    showStatus('error', e.message || 'Transcript fetch failed');
    btn.disabled = false;
    return;
  }

  // Step 2: get API key and stream article from Claude directly
  const key = await getKey();
  if (!key) { showStatus('error', 'API key not found — check Vercel env vars.'); btn.disabled = false; return; }

  showStatus('loading', 'Writing article…');
  document.getElementById('article-card').style.display = 'block';
  document.getElementById('article-body').innerHTML = '<span class="cursor"></span>';

  try {
    const res = await fetch(CLAUDE_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 4096,
        stream: true,
        messages: [{ role: 'user', content: ARTICLE_PROMPT(transcript) }],
      }),
    });

    if (!res.ok) {
      const err = await res.json();
      showStatus('error', err.error?.message || 'Claude API error');
      btn.disabled = false;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') continue;
        try {
          const evt = JSON.parse(payload);
          if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
            rawMarkdown += evt.delta.text;
            scheduleRender();
          }
        } catch {}
      }
    }

    // Final render
    renderArticle(true);

  } catch (e) {
    showStatus('error', 'Streaming error: ' + e.message);
    btn.disabled = false;
    return;
  }

  // Step 3: parse thumbnail lines and generate
  let line1 = '', line2 = '';
  if (rawMarkdown.includes('---THUMBNAIL---') && rawMarkdown.includes('---END---')) {
    const block = rawMarkdown.split('---THUMBNAIL---')[1].split('---END---')[0];
    for (const row of block.trim().split('\n')) {
      if (row.startsWith('LINE1:')) line1 = row.replace('LINE1:', '').trim();
      if (row.startsWith('LINE2:')) line2 = row.replace('LINE2:', '').trim();
    }
    // Remove thumbnail block from displayed article
    rawMarkdown = rawMarkdown.split('---THUMBNAIL---')[0].trim();
    renderArticle(true);
  }

  thumbData.line1 = line1;
  thumbData.line2 = line2;
  document.getElementById('t-line1').value = line1;
  document.getElementById('t-line2').value = line2;
  document.getElementById('thumb-card').style.display = 'block';
  document.getElementById('status').style.display = 'none';
  btn.disabled = false;

  await regenThumb();
}

// ── Render helpers ──────────────────────────────────────────────────────────
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => renderArticle(false), 80);
}

function renderArticle(final) {
  const body = document.getElementById('article-body');
  // Strip thumbnail block if present
  const text = rawMarkdown.includes('---THUMBNAIL---')
    ? rawMarkdown.split('---THUMBNAIL---')[0]
    : rawMarkdown;
  body.innerHTML = marked.parse(text) + (final ? '' : '<span class="cursor"></span>');
}

// ── Thumbnail ───────────────────────────────────────────────────────────────
async function regenThumb() {
  const btn = document.getElementById('regen-btn');
  if (btn) btn.disabled = true;
  document.getElementById('thumb-preview').innerHTML = '<div class="spinner"></div>';

  const line1 = document.getElementById('t-line1').value.trim();
  const line2 = document.getElementById('t-line2').value.trim();
  const complexity = parseInt(document.getElementById('complexity').value) / 100;

  try {
    const res = await fetch(THUMB_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ line1, line2, complexity, bg_name: thumbData.bg, photo_side: thumbData.side, photo_index: thumbData.photo }),
    });
    const data = await res.json();
    if (res.ok && data.thumbnail) {
      currentThumbB64 = data.thumbnail;
      const img = document.createElement('img');
      img.src = 'data:image/png;base64,' + data.thumbnail;
      document.getElementById('thumb-preview').innerHTML = '';
      document.getElementById('thumb-preview').appendChild(img);
    } else {
      document.getElementById('thumb-preview').innerHTML = `<span style="font-size:12px;color:#c0392b;padding:16px">${data.error || 'Failed'}</span>`;
    }
  } catch (e) {
    document.getElementById('thumb-preview').innerHTML = `<span style="font-size:12px;color:#c0392b;padding:16px">Server not reachable</span>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

function downloadThumb() {
  if (!currentThumbB64) return;
  const a = document.createElement('a');
  a.download = (document.getElementById('t-line2').value || 'thumbnail').toLowerCase().replace(/\s+/g,'-') + '.png';
  a.href = 'data:image/png;base64,' + currentThumbB64;
  a.click();
}

function selectBg(el, name) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active'); thumbData.bg = name;
}
function selectSide(el, side) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); thumbData.side = side;
}

// ── Copy ────────────────────────────────────────────────────────────────────
function copyMarkdown() {
  navigator.clipboard.writeText(rawMarkdown).then(() => flash(event.target, 'Copied!'));
}
function copyText() {
  navigator.clipboard.writeText(document.getElementById('article-body').innerText)
    .then(() => flash(event.target, 'Copied!'));
}
function flash(el, msg) {
  const btn = el.closest('button');
  const orig = btn.innerText; btn.innerText = msg;
  setTimeout(() => btn.innerText = orig, 1500);
}

// ── Status ──────────────────────────────────────────────────────────────────
function showStatus(type, text) {
  const el = document.getElementById('status');
  el.style.display = 'flex';
  el.className = 'status' + (type === 'error' ? ' status--error' : '');
  el.innerHTML = type === 'loading' ? `<div class="spinner"></div> ${text}` : text;
}

document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
// Warm up the key cache on load so first generate is instant
getKey();
</script>
</body>
