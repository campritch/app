<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube → Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --dark: #0e1323;
      --grey-1: #707481;
      --text-primary: #252733;
      --text-secondary: #5a5f6e;
      --border: #dee0e4;
      --border-light: #e8e8e8;
      --white: #ffffff;
      --coral: #ed7470;
      --btn-dark: #111111;
      --pill-bg: #f3f4f6;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; line-height: 1.5;
      color: var(--dark); background: #f5f5f3;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ── Top bar ── */
    .top-bar {
      position: sticky; top: 0; z-index: 200;
      height: 56px; display: flex; align-items: center; gap: 16px;
      padding: 0 28px; background: var(--white);
      border-bottom: 1px solid var(--border-light);
    }
    .top-bar__logo {
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 15px; color: var(--dark);
      text-decoration: none; flex-shrink: 0; letter-spacing: -0.3px;
    }
    .logo-mark {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--coral); display: flex; align-items: center; justify-content: center;
    }
    .top-bar__title {
      flex: 1; font-size: 13px; font-weight: 600; color: var(--text-secondary);
    }

    /* ── Page layout ── */
    .page { max-width: 900px; margin: 40px auto; padding: 0 24px 80px; }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      margin-bottom: 24px;
    }
    .card__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border-light);
    }
    .card__label {
      font-size: 12px; font-weight: 600; color: var(--grey-1);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .card__body { padding: 28px 32px; }

    /* ── Input card ── */
    .input-card { padding: 32px; }
    .input-card h1 {
      margin: 0 0 6px;
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--dark);
    }
    .input-card p {
      margin: 0 0 24px;
      font-size: 13px; color: var(--text-secondary); line-height: 1.6;
    }
    .input-row { display: flex; gap: 10px; }
    .url-input {
      flex: 1; height: 42px; padding: 0 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 13px; color: var(--text-primary);
      outline: none; transition: border-color 0.15s;
    }
    .url-input:focus { border-color: var(--dark); }
    .url-input::placeholder { color: var(--grey-1); }

    /* ── Buttons ── */
    .btn-dark {
      height: 42px; padding: 0 20px;
      background: var(--btn-dark); color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 7px;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-dark:hover { opacity: 0.85; }
    .btn-dark:disabled { opacity: 0.45; cursor: default; }
    .btn-outline {
      height: 32px; padding: 0 14px;
      background: none; border: 1px solid var(--border); border-radius: 8px;
      font-size: 12px; font-weight: 600; color: var(--text-primary);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-outline:hover { background: var(--pill-bg); }
    .btn-sm {
      height: 28px; padding: 0 12px;
      background: none; border: 1px solid var(--border); border-radius: 7px;
      font-size: 11px; font-weight: 600; color: var(--text-primary);
    }
    .btn-sm:hover { background: var(--pill-bg); }
    .btn-coral {
      height: 36px; padding: 0 16px;
      background: var(--coral); color: #fff;
      border: none; border-radius: 9px;
      font-size: 12px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-coral:hover { opacity: 0.9; }

    /* ── Status ── */
    .status {
      margin-top: 16px; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      color: var(--text-secondary);
    }
    .status--error { color: #c0392b; }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--dark);
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Article body ── */
    .article-body {
      padding: 36px 40px;
      font-size: 15px; line-height: 1.75; color: var(--text-primary);
    }
    .article-body h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.6px;
      color: var(--dark); margin: 0 0 20px; line-height: 1.2;
    }
    .article-body h2 {
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
      color: var(--dark); margin: 32px 0 12px;
    }
    .article-body h3 { font-size: 15px; font-weight: 700; color: var(--dark); margin: 24px 0 8px; }
    .article-body p { margin: 0 0 16px; }
    .article-body ul, .article-body ol { margin: 0 0 16px; padding-left: 22px; }
    .article-body li { margin-bottom: 6px; }
    .article-body blockquote {
      margin: 24px 0; padding: 14px 20px;
      border-left: 3px solid var(--coral);
      background: #fff5f5; border-radius: 0 8px 8px 0;
      font-style: italic; color: var(--text-secondary);
    }
    .article-body strong { font-weight: 700; color: var(--dark); }
    .article-body code {
      background: var(--pill-bg); border-radius: 4px; padding: 2px 6px; font-size: 13px;
    }

    /* ── Thumbnail section ── */
    .thumb-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 24px;
      align-items: start;
    }
    .thumb-preview {
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border-light);
      aspect-ratio: 16/9; background: var(--pill-bg);
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-preview img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .thumb-preview--loading {
      flex-direction: column; gap: 10px; color: var(--grey-1); font-size: 12px;
    }

    /* ── Controls ── */
    .controls { display: flex; flex-direction: column; gap: 20px; }
    .control-group label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--grey-1); text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .control-group input[type="text"] {
      width: 100%; height: 34px; padding: 0 10px;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--text-primary); outline: none;
    }
    .control-group input[type="text"]:focus { border-color: var(--dark); }

    /* Slider */
    .slider-wrap { display: flex; align-items: center; gap: 10px; }
    .slider-label { font-size: 11px; color: var(--grey-1); white-space: nowrap; }
    input[type="range"] {
      flex: 1; -webkit-appearance: none; height: 4px;
      border-radius: 2px; background: var(--border); outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: var(--dark); cursor: pointer;
    }
    .slider-val {
      font-size: 11px; font-weight: 700; color: var(--dark);
      min-width: 28px; text-align: right;
    }

    /* Chip selectors */
    .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      height: 28px; padding: 0 12px;
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      background: none; cursor: pointer; transition: all 0.1s;
    }
    .chip.active {
      background: var(--dark); color: #fff; border-color: var(--dark);
    }
    .chip--coral.active { background: var(--coral); border-color: var(--coral); }

    /* Color swatches */
    .swatch-row { display: flex; gap: 8px; }
    .swatch {
      width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.1s;
    }
    .swatch.active { border-color: var(--dark); outline: 2px solid var(--dark); outline-offset: 2px; }

    .thumb-actions { display: flex; gap: 8px; margin-top: 4px; }

    /* Photo thumbs */
    .photo-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .photo-chip {
      width: 42px; height: 42px; border-radius: 8px;
      border: 2px solid transparent; cursor: pointer;
      overflow: hidden; transition: border-color 0.1s;
      background: var(--pill-bg);
    }
    .photo-chip img { width: 100%; height: 100%; object-fit: cover; }
    .photo-chip.active { border-color: var(--coral); }
    .photo-chip--label {
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: var(--grey-1); text-align: center;
      padding: 2px;
    }
  </style>
</head>
<body>

<header class="top-bar">
  <a href="index.html" class="top-bar__logo">
    <div class="logo-mark">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="6" cy="6" r="4" fill="white"/>
      </svg>
    </div>
    SpotsNow
  </a>
  <span class="top-bar__title">YouTube → Article</span>
</header>

<main class="page">

  <!-- Input -->
  <div class="card input-card">
    <h1>YouTube to Article</h1>
    <p>Paste a YouTube URL — Claude fetches the transcript, writes a polished article, and generates a branded thumbnail.</p>
    <div class="input-row">
      <input id="url-input" class="url-input" type="url"
        placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
      <button class="btn-dark" id="generate-btn" onclick="generate()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 6.5h9M6.5 2l4.5 4.5-4.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Generate
      </button>
    </div>
    <div class="status" id="status" style="display:none;"></div>
  </div>

  <!-- Thumbnail -->
  <div class="card" id="thumb-card" style="display:none;">
    <div class="card__header">
      <span class="card__label">Thumbnail</span>
      <div style="display:flex;gap:8px;">
        <button class="btn-outline" onclick="regenThumb()" id="regen-btn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M10 6A4 4 0 112 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10 3v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Regenerate
        </button>
        <button class="btn-outline" onclick="downloadThumb()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download
        </button>
      </div>
    </div>
    <div class="card__body">
      <div class="thumb-layout">
        <!-- Preview -->
        <div>
          <div class="thumb-preview" id="thumb-preview">
            <div class="spinner"></div>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">

          <div class="control-group">
            <label>Headline line 1</label>
            <input type="text" id="t-line1" placeholder="THE COST OF" />
          </div>

          <div class="control-group">
            <label>Headline line 2 (highlight)</label>
            <input type="text" id="t-line2" placeholder="PODCAST ADS" />
          </div>

          <div class="control-group">
            <label>Style complexity</label>
            <div class="slider-wrap">
              <span class="slider-label">Clean</span>
              <input type="range" id="complexity" min="0" max="100" value="70"
                oninput="document.getElementById('complexity-val').textContent=this.value+'%'" />
              <span class="slider-val" id="complexity-val">70%</span>
              <span class="slider-label">Elaborate</span>
            </div>
          </div>

          <div class="control-group">
            <label>Background</label>
            <div class="swatch-row">
              <div class="swatch active" data-bg="dark"
                style="background:#0e1323;" onclick="selectBg(this,'dark')" title="Dark navy"></div>
              <div class="swatch" data-bg="black"
                style="background:#111111;" onclick="selectBg(this,'black')" title="Black"></div>
              <div class="swatch" data-bg="coral"
                style="background:#ed7470;" onclick="selectBg(this,'coral')" title="Coral"></div>
              <div class="swatch" data-bg="navy"
                style="background:#0a0e28;" onclick="selectBg(this,'navy')" title="Deep navy"></div>
            </div>
          </div>

          <div class="control-group">
            <label>Photo side</label>
            <div class="chip-row">
              <button class="chip active" data-side="right" onclick="selectSide(this,'right')">Right</button>
              <button class="chip" data-side="left" onclick="selectSide(this,'left')">Left</button>
            </div>
          </div>

          <div class="control-group">
            <label>Photo</label>
            <div class="photo-grid" id="photo-grid"></div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- Article -->
  <div class="card" id="article-card" style="display:none;">
    <div class="card__header">
      <span class="card__label">Article</span>
      <div style="display:flex;gap:8px;">
        <button class="btn-outline" onclick="copyMarkdown()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <rect x="4" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M1 8V1.5A.5.5 0 011.5 1H8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          Copy markdown
        </button>
        <button class="btn-outline" onclick="copyText()">Copy text</button>
      </div>
    </div>
    <div class="article-body" id="article-body"></div>
  </div>

</main>

<script>
const isLocal = window.location.hostname === 'localhost';
const API = isLocal ? 'http://localhost:5055' : '';
const PATH = isLocal ? '' : '/api';
let rawMarkdown = '';
let thumbData = { line1: '', line2: '', complexity: 70, bg: 'dark', side: 'right', photo: 0 };
let currentThumbB64 = '';

const PHOTOS = [
  { label: '1', path: 0 },
  { label: '2', path: 1 },
  { label: '3', path: 2 },
  { label: 'Cam', path: 3 },
  { label: 'B&W', path: 4 },
];

// Build photo chips
(function buildPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  PHOTOS.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-chip photo-chip--label' + (i === 0 ? ' active' : '');
    div.dataset.idx = i;
    div.textContent = p.label;
    div.onclick = () => selectPhoto(div, i);
    grid.appendChild(div);
  });
})();

async function generate() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  document.getElementById('article-card').style.display = 'none';
  document.getElementById('thumb-card').style.display = 'none';
  showStatus('loading', 'Fetching transcript…');

  try {
    const res = await fetch(API + PATH + '/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) { showStatus('error', data.error || 'Something went wrong'); return; }

    // Article
    rawMarkdown = data.article;
    document.getElementById('article-body').innerHTML = marked.parse(rawMarkdown);
    document.getElementById('article-card').style.display = 'block';

    // Thumbnail
    thumbData.line1 = data.line1 || '';
    thumbData.line2 = data.line2 || '';
    document.getElementById('t-line1').value = thumbData.line1;
    document.getElementById('t-line2').value = thumbData.line2;
    document.getElementById('thumb-card').style.display = 'block';

    if (data.thumbnail) {
      showThumb(data.thumbnail);
    } else {
      setThumbLoading();
    }

    document.getElementById('status').style.display = 'none';
  } catch (err) {
    showStatus('error', 'Could not reach the server. Is youtube_article_server.py running?');
  } finally {
    btn.disabled = false;
  }
}

async function regenThumb() {
  const btn = document.getElementById('regen-btn');
  btn.disabled = true;
  setThumbLoading();

  const line1 = document.getElementById('t-line1').value.trim();
  const line2 = document.getElementById('t-line2').value.trim();
  const complexity = parseInt(document.getElementById('complexity').value) / 100;

  try {
    const res = await fetch(API + PATH + '/thumbnail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line1, line2,
        complexity,
        bg_name: thumbData.bg,
        photo_side: thumbData.side,
        photo_index: thumbData.photo,
      }),
    });
    const data = await res.json();
    if (res.ok && data.thumbnail) showThumb(data.thumbnail);
    else setThumbError(data.error || 'Generation failed');
  } catch (e) {
    setThumbError('Server not reachable');
  } finally {
    btn.disabled = false;
  }
}

function showThumb(b64) {
  currentThumbB64 = b64;
  const preview = document.getElementById('thumb-preview');
  preview.innerHTML = '';
  const img = document.createElement('img');
  img.src = 'data:image/png;base64,' + b64;
  preview.appendChild(img);
}

function setThumbLoading() {
  document.getElementById('thumb-preview').innerHTML =
    '<div class="spinner"></div>';
}

function setThumbError(msg) {
  document.getElementById('thumb-preview').innerHTML =
    `<span style="font-size:12px;color:#c0392b;padding:16px;text-align:center">${msg}</span>`;
}

function downloadThumb() {
  if (!currentThumbB64) return;
  const a = document.createElement('a');
  const line2 = document.getElementById('t-line2').value || 'thumbnail';
  a.download = line2.toLowerCase().replace(/\s+/g, '-') + '.png';
  a.href = 'data:image/png;base64,' + currentThumbB64;
  a.click();
}

function selectBg(el, name) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  thumbData.bg = name;
}

function selectSide(el, side) {
  document.querySelectorAll('.chip[data-side]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  thumbData.side = side;
}

function selectPhoto(el, idx) {
  document.querySelectorAll('.photo-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  thumbData.photo = idx;
}

function showStatus(type, text) {
  const el = document.getElementById('status');
  el.style.display = 'flex';
  el.className = 'status' + (type === 'error' ? ' status--error' : '');
  el.innerHTML = type === 'loading'
    ? `<div class="spinner"></div> ${text}`
    : text;
}

function copyMarkdown() {
  navigator.clipboard.writeText(rawMarkdown).then(() => {
    const btn = event.target.closest('button');
    const orig = btn.innerText; btn.innerText = 'Copied!';
    setTimeout(() => btn.innerText = orig, 1500);
  });
}

function copyText() {
  const text = document.getElementById('article-body').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target.closest('button');
    const orig = btn.innerText; btn.innerText = 'Copied!';
    setTimeout(() => btn.innerText = orig, 1500);
  });
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>

</body>
</html>
