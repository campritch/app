<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not found — SpotsNow</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #17212b;
      --coral: #ff6267;
      --dark: #0e1323;
      --grey-1: #8a95a3;
      --text-primary: #17212b;
      --text-secondary: #5a6472;
      --bg-page: #fafafa;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--dark);
      background: var(--bg-page);
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .wrap {
      text-align: center;
      max-width: 380px;
    }
    .mark {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--coral);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .code {
      font-size: 13px; font-weight: 600;
      color: var(--grey-1);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin: 0 0 10px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text-primary);
    }
    p {
      margin: 0;
      font-size: 14px; line-height: 1.6;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M6 12h8a5 5 0 005-5V5M18 12l-4-4M18 12l-4 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="code">404</p>
    <h1>This page doesn't exist.</h1>
    <p>If you followed a link here, it's probably out of date.</p>
  </main>
</body>
</html>
